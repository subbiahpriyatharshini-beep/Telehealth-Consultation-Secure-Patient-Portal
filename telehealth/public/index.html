<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Telehealth Portal</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { font-family: Arial, sans-serif; background: #f9f9f9; color: #333; }
    h1, h2 { color: #0066cc; }
    form, ul { margin: 20px; padding: 15px; background: #fff; border-radius: 8px; }
    button { background: #0066cc; color: #fff; padding: 8px 12px; border: none; border-radius: 4px; }
    .section { margin-bottom: 30px; }
  </style>
</head>
<body>
  <h1>Telehealth Consultation – Secure Patient Portal</h1>
<nav>
  <a href="dashboard.html">Dashboard</a>
  <a href="appointments.html">Appointments</a>
  <a href="prescriptions.html">Prescriptions</a>
</nav>

  <!-- Register -->
  <div class="section">
    <h2>Register</h2>
    <form onsubmit="event.preventDefault(); registerUser();">
      <input id="reg-username" placeholder="Username" required />
      <input id="reg-password" type="password" placeholder="Password" required />
      <button type="submit">Register</button>
    </form>
  </div>

  <!-- Login -->
  <div class="section">
    <h2>Login</h2>
    <form onsubmit="event.preventDefault(); loginUser();">
      <input id="login-username" placeholder="Username" required />
      <input id="login-password" type="password" placeholder="Password" required />
      <button type="submit">Login</button>
    </form>
  </div>

  <!-- Appointments -->
  <div class="section">
    <h2>Appointments</h2>
    <button onclick="loadAppointments()">Load Appointments</button>
    <ul id="appointments-list"></ul>
  </div>

  <!-- Prescriptions -->
  <div class="section">
    <h2>Prescriptions</h2>
    <button onclick="loadPrescriptions()">Load Prescriptions</button>
    <ul id="prescriptions-list"></ul>
  </div>

  <script>
    async function registerUser() {
      const username = document.getElementById("reg-username").value;
      const password = document.getElementById("reg-password").value;

      const res = await fetch("http://localhost:5000/api/register", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password })
      });

      if (res.ok) {
        alert("Registered successfully!");
      } else {
        alert("Registration failed");
      }
    }

    async function loginUser() {
      const username = document.getElementById("login-username").value;
      const password = document.getElementById("login-password").value;

      const res = await fetch("http://localhost:5000/api/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password })
      });

      const data = await res.json();
      if (data.token) {
        localStorage.setItem("token", data.token);
        alert("Login successful!");
      } else {
        alert("Login failed");
      }
    }

    async function loadAppointments() {
      const token = localStorage.getItem("token");
      const res = await fetch("http://localhost:5000/api/appointments", {
        headers: { Authorization: `Bearer ${token}` }
      });
      const data = await res.json();

      let html = "";
      data.forEach(a => {
        html += `
          <li>
            👤 ${a.patient} <br>
            🩺 Dr. ${a.doctor} <br>
            📅 ${new Date(a.date).toLocaleString()}
          </li>
        `;
      });
      document.getElementById("appointments-list").innerHTML = html;
    }

    async function loadPrescriptions() {
      const token = localStorage.getItem("token");
      const res = await fetch("http://localhost:5000/api/prescriptions", {
        headers: { Authorization: `Bearer ${token}` }
      });
      const data = await res.json();

      let html = "";
      data.forEach(p => {
        html += `
          <li>
            💊 ${p.medicine} <br>
            📝 ${p.notes} <br>
            👨‍⚕️ Dr. ${p.doctor}
          </li>
        `;
      });
      document.getElementById("prescriptions-list").innerHTML = html;
    }
  </script>
</body>
</html>
