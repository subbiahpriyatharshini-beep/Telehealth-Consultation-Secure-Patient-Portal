<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Telehealth Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .card {
      background: #fff;
      border-radius: 10px;
      padding: 15px;
      margin: 10px 0;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
    .card h3 {
      margin: 0;
      color: #0066cc;
    }
    .card p {
      margin: 5px 0;
    }
    .section {
      margin-bottom: 30px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Telehealth Dashboard</h1>

    <div class="section">
      <h2>Appointments</h2>
      <button onclick="loadAppointments()">Load Appointments</button>
      <div id="appointments-list"></div>
    </div>

    <div class="section">
      <h2>Prescriptions</h2>
      <button onclick="loadPrescriptions()">Load Prescriptions</button>
      <div id="prescriptions-list"></div>
    </div>
  </div>

  <script>
    async function loadAppointments() {
      const token = localStorage.getItem("token");
      const res = await fetch("/api/appointments", {
        headers: { Authorization: `Bearer ${token}` }
      });
      const data = await res.json();

      let html = "";
      data.forEach(a => {
        html += `
          <div class="card">
            <h3>👤 ${a.patient}</h3>
            <p>🩺 Doctor: ${a.doctor}</p>
            <p>📅 Date: ${new Date(a.date).toLocaleString()}</p>
          </div>
        `;
      });
      document.getElementById("appointments-list").innerHTML = html;
    }

    async function loadPrescriptions() {
      const token = localStorage.getItem("token");
      const res = await fetch("/api/prescriptions", {
        headers: { Authorization: `Bearer ${token}` }
      });
      const data = await res.json();

      let html = "";
      data.forEach(p => {
        html += `
          <div class="card">
            <h3>💊 ${p.medicine}</h3>
            <p>📝 Notes: ${p.notes}</p>
            <p>👨‍⚕️ Doctor: ${p.doctor}</p>
            <p>👤 Patient: ${p.patient}</p>
          </div>
        `;
      });
      document.getElementById("prescriptions-list").innerHTML = html;
    }
  </script>
</body>
</html>
